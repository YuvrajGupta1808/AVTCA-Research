name: CI

on:
  push:
    branches: ["main", "production", "development"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CPU-only PyTorch (CI — no GPU needed)
        run: |
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Install project dependencies
        run: |
          pip install -r requirements.txt

      - name: Install test runner
        run: pip install pytest

      - name: Verify critical imports
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from models.multimodal_cnn import MultiModalCNN
          from models.transformer import AttentionBlock, Attention
          from models.efficient_face import LocalFeatureExtractor, InvertedResidual
          from src.config.opts import parse_opts
          from src.models.factory import generate_model
          from src.data.dataset import DATASET_REGISTRY
          from src.utils.common import AverageMeter, Logger, calculate_accuracy
          from src.data import transforms
          print('All imports OK')
          "

      - name: Check dataset registry
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from src.data.dataset import DATASET_REGISTRY
          assert set(DATASET_REGISTRY.keys()) == {'RAVDESS', 'CREMAD'}, f'Unexpected: {set(DATASET_REGISTRY.keys())}'
          print('Dataset registry OK')
          "

      - name: Run tests
        run: pytest tests/ -v --tb=short
